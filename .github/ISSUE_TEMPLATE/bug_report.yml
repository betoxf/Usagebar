name: Bug report
description: Report a reproducible problem with Usagebar.
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: Remove tokens, cookies, account identifiers, and credential-file contents from every field and attachment.
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues for this problem.
          required: true
        - label: I am using the latest Usagebar release.
          required: true
        - label: I removed credentials and account data from this report.
          required: true
  - type: input
    id: version
    attributes:
      label: Usagebar version
      placeholder: "For example: 1.2.7"
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "For example: macOS 15.5"
    validations:
      required: true
  - type: dropdown
    id: install
    attributes:
      label: Installation method
      options: [Homebrew cask, GitHub release, Built from source]
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: Affected provider
      options: [Claude, Codex, Both, General app behavior]
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Problem
      description: Describe what happened and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Launch Usagebar
        2. Open ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Sanitized evidence
      description: Add screenshots or short logs only after removing credentials and account data.
      render: text
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Include display settings, provider combination, or recent upgrade details that may matter.
