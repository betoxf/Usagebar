name: Feature request
description: Propose a focused improvement to Usagebar.
title: "[Feature]: "
body:
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and requests.
          required: true
        - label: This request preserves Usagebar's local, private, menu-bar-first scope.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What workflow is difficult today, and who experiences it?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the smallest behavior that would solve the problem.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: impact
    attributes:
      label: Potential impact
      options:
        - label: Credential discovery or storage
        - label: Provider API or network destination
        - label: Menu-bar layout or animation
        - label: Launch at login or system integration
        - label: Packaging, signing, or Homebrew
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add sketches or examples, with all account data removed.
