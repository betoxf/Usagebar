name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build macOS app
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app
      - name: Build
        run: |
          xcodebuild \
            -project JustaUsageBar.xcodeproj \
            -scheme JustaUsageBar \
            -configuration Debug \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            build
      - name: Verify install and update safeguards
        run: |
          app="build/DerivedData/Build/Products/Debug/Usagebar.app"
          test "$(/usr/libexec/PlistBuddy -c 'Print :LSMultipleInstancesProhibited' "$app/Contents/Info.plist")" = "true"
          test -f "$app/Contents/Resources/install_update_and_relaunch.sh"
          test ! -e Casks/justausagebar.rb
          ruby -c Casks/usagebar.rb
          ruby -rjson -e 'abort unless JSON.parse(File.read("cask_renames.json")) == {"justausagebar" => "usagebar"}'
