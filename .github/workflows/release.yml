name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build Release
        run: |
          xcodebuild -project JustaUsageBar.xcodeproj \
            -scheme JustaUsageBar \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            build

      - name: Create zip
        run: |
          mkdir -p build/Release
          cp -R build/DerivedData/Build/Products/Release/Usagebar.app build/Release/
          cd build/Release && zip -r ../../Usagebar.zip Usagebar.app

      - name: Get SHA256
        id: sha
        run: echo "sha256=$(shasum -a 256 Usagebar.zip | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: Usagebar.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
